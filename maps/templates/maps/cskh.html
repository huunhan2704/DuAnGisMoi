<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Trung tâm Hỗ trợ & CSKH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                <i class="fas fa-city me-2"></i>URBAN MANAGER
            </a>
            <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm">
                <i class="fas fa-home me-1"></i> Trang chủ
            </a>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
                    <i class="fas fa-check-circle me-2"></i> {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card border-0 shadow-lg overflow-hidden">
                    <div class="card-header bg-white p-4 border-bottom-0 text-center">
                        <div class="display-1 text-primary mb-3"><i class="fas fa-headset"></i></div>
                        <h2 class="fw-bold text-uppercase">Trung tâm Hỗ trợ</h2>
                        <p class="text-muted">Bạn gặp khó khăn? Đừng lo, chúng tôi ở đây để giúp bạn!</p>
                    </div>
                    
                    <div class="card-body p-4 pt-0">
                        <form method="POST">
                            {% csrf_token %}
                            
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
                                    <input type="text" name="ho_ten" class="form-control" required placeholder="Nhập họ tên của bạn" 
                                        value="{{ user.first_name }} {{ user.last_name }}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label fw-bold">Email liên hệ <span class="text-danger">*</span></label>
                                    <input type="email" name="email" class="form-control" required placeholder="name@example.com"
                                        value="{{ user.email }}">
                                </div>

                                <div class="col-md-4">
                                    <label class="form-label fw-bold">Số điện thoại</label>
                                    <input type="text" name="sdt" class="form-control" placeholder="09xxxxxxx">
                                </div>
                                <div class="col-md-8">
                                    <label class="form-label fw-bold">Vấn đề cần hỗ trợ <span class="text-danger">*</span></label>
                                    <select name="chu_de" class="form-select bg-light border-primary" required>
                                        <option value="" selected disabled>-- Chọn vấn đề --</option>
                                        <option value="tai_khoan">🔑 Lỗi tài khoản / Đăng nhập</option>
                                        <option value="sai_hien_trang">⚠️ Báo cáo sai hiện trạng</option>
                                        <option value="huong_dan">📘 Cần hướng dẫn sử dụng</option>
                                        <option value="gop_y">💡 Góp ý tính năng mới</option>
                                        <option value="khac">💬 Vấn đề khác...</option>
                                    </select>
                                </div>

                                <div class="col-12">
                                    <label class="form-label fw-bold">Nội dung chi tiết <span class="text-danger">*</span></label>
                                    <textarea name="noi_dung" class="form-control" rows="5" required placeholder="Mô tả kỹ vấn đề bạn gặp phải để chúng tôi hỗ trợ nhanh nhất..."></textarea>
                                </div>

                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-primary w-100 fw-bold py-3 shadow-sm hover-effect">
                                        <i class="fas fa-paper-plane me-2"></i> GỬI YÊU CẦU HỖ TRỢ
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer bg-light text-center p-3 small text-muted">
                        <i class="fas fa-clock me-1"></i> Thời gian làm việc: 8:00 - 17:00 (Thứ 2 - Thứ 6)
                    </div>
                </div>
            </div>
        </div>
    </div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            setTimeout(function() {
                var alerts = document.querySelectorAll('.alert');
                alerts.forEach(function(alert) {
                    // Dùng hiệu ứng fade out của Bootstrap
                    var bsAlert = new bootstrap.Alert(alert);
                    bsAlert.close();
                });
            }, 4000); // 4000ms = 4 giây
        });
    </script>
</body>
</html>
