    <!DOCTYPE html>
    <html lang="vi">
    <head>
        <title>Tin tức Đô thị</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <style>
            .news-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px 8px 0 0; }
            .card:hover { transform: translateY(-5px); transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        </style>
    </head>
    <body class="bg-light">
        <nav class="navbar navbar-dark bg-primary mb-4 shadow-sm">
            <div class="container">
                <a class="navbar-brand fw-bold" href="{% url 'home' %}">
                    <i class="fas fa-city me-2"></i>URBAN MANAGER
                </a>
                <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm">
                    <i class="fas fa-home me-1"></i> Trang chủ
                </a>
            </div>
        </nav>

        
        <div class="container pb-5">
            <h2 class="mb-4 border-bottom pb-2 text-primary fw-bold">
                <i class="fa-solid fa-newspaper me-2"></i>Tin tức Đô thị (Từ VnExpress)
            </h2>
            <a href="{% url 'home' %}" class="btn btn-outline-light btn-sm fw-bold">
                <i class="fas fa-home me-1"></i> Về Trang chủ
            </a>
            
            <div class="row g-4">
                {% for news in news_list %}
                <div class="col-md-4">
                    <div class="card h-100 shadow-sm border-0">
                        <img src="{{ news.image }}" class="news-img" alt="Ảnh tin tức">
                        
                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title fw-bold">
                                <a href="{{ news.link }}" target="_blank" class="text-decoration-none text-dark hover-primary">
                                    {{ news.title }}
                                </a>
                            </h5>
                            <p class="text-muted small mb-2"><i class="fa-regular fa-clock me-1"></i> {{ news.published }}</p>
                            
                            <p class="card-text text-secondary small flex-grow-1">
                                {{ news.summary|striptags|truncatechars:100 }}
                            </p>
                            
                            <a href="{{ news.link }}" target="_blank" class="btn btn-outline-primary btn-sm mt-3 fw-bold">
                                Đọc tiếp <i class="fa-solid fa-arrow-right ms-1"></i>
                            </a>
                        </div>
                    </div>
                </div>
                {% empty %}
                <div class="col-12 text-center py-5">
                    <i class="fa-solid fa-wifi fa-3x text-muted mb-3"></i>
                    <p>Không tải được tin tức. Vui lòng kiểm tra kết nối mạng!</p>
                </div>
                {% endfor %}
            </div>
        </div>
    </body>
    </html>
