<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đặt lại mật khẩu mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
        <h3 class="text-primary fw-bold text-center mb-3">Mật Khẩu Mới</h3>
        <p class="text-muted small text-center">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>
        
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label small fw-bold">{{ field.label }}</label>
                    <input type="{{ field.field.widget.input_type }}" name="{{ field.name }}" class="form-control">
                    {% if field.errors %}
                        <small class="text-danger">{{ field.errors.0 }}</small>
                    {% endif %}
                    <div class="form-text small text-muted">{{ field.help_text }}</div>
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-success w-100 fw-bold mt-2">Xác nhận đổi mật khẩu</button>
        </form>
    </div>
</body>
</html>
