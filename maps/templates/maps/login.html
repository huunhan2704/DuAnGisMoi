<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 1. Thiết lập cho body làm khung chứa */
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative; /* Quan trọng để định vị lớp nền */
            overflow: hidden;   /* Ẩn các phần thừa do hiệu ứng blur */
        }

        /* 2. Tạo một lớp nền giả (::before) để chứa hình ảnh và làm mờ */
        body::before {
            content: "";
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px; /* Phóng to hơn body một chút để tránh bị hở viền trắng khi blur */
            z-index: -1; /* Đẩy lớp nền này ra sau lưng nội dung chính */

            /* Hình nền y hệt trang chủ */
            background: linear-gradient(rgba(0, 51, 102, 0.3), rgba(0, 51, 102, 0.3)), url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1770&q=80');
            background-size: cover;
            background-position: center;

            /* HIỆU ỨNG LÀM MỜ*/
            filter: blur(8px); /* Độ mờ là 8px, bạn có thể tăng giảm tùy thích */
        }

        /* 3. Khung đăng nhập ở giữa */
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: 15px;
            /* Tăng đổ bóng để nổi bật hơn trên nền mới */
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            /* Làm nền trắng hơi trong suốt một chút cho hiện đại */
            background: rgba(255, 255, 255, 0.95);
        }

        /* Các style khác giữ nguyên */
        .brand-logo {
            font-size: 4rem;
            color: #0d6efd;
            margin-bottom: 1rem;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #0d6efd;
        }
        .btn-login {
            padding: 12px;
            font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="mb-4">
            <i class="fas fa-city brand-logo"></i>
            <h3 class="fw-bold text-dark">Urban Manager</h3>
            <p class="text-muted">Đăng nhập dành cho Cán bộ</p>
        </div>

        <form method="POST">
            {% csrf_token %} <div class="form-floating mb-3 text-start">
                <input type="text" class="form-control" id="username" placeholder="Tên đăng nhập" required>
                <label for="username"><i class="fas fa-user me-2"></i>Tên đăng nhập</label>
            </div>

            <div class="form-floating mb-4 text-start">
                <input type="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                <label for="password"><i class="fas fa-lock me-2"></i>Mật khẩu</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-login mb-3">Đăng nhập hệ thống</button>

            <div class="d-flex justify-content-between align-items-center mt-4">
                <a href="{% url 'home' %}" class="text-decoration-none text-muted small">
                    <i class="fas fa-arrow-left me-1"></i> Quay lại Trang chủ</a>
                <a href="#" class="text-decoration-none text-muted small">Quên mật khẩu?</a>
            </div>
        </form>
    </div>

</body>
</html>
