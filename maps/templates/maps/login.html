<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: "";
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            z-index: -1;
            background: linear-gradient(rgba(0, 51, 102, 0.3), rgba(0, 51, 102, 0.3)), url('https://images.unsplash.com/photo-1480714378408-67cf0d13bc1b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1770&q=80');
            background-size: cover;
            background-position: center;
            filter: blur(8px);
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.95);
        }
        .brand-logo { font-size: 4rem; color: #0d6efd; margin-bottom: 1rem; }
        .form-control:focus { box-shadow: none; border-color: #0d6efd; }
        .btn-login { padding: 12px; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="login-card text-center">
        <div class="mb-4">
            <i class="fas fa-city brand-logo"></i>
            <h3 class="fw-bold text-dark">Urban Manager</h3>
            <p class="text-muted">Đăng nhập dành cho Cán bộ</p>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger small text-start">
                <i class="fas fa-exclamation-circle me-1"></i> Tên đăng nhập hoặc mật khẩu không đúng!
            </div>
        {% endif %}

        <form method="POST">
            {% csrf_token %} 
            
            <div class="form-floating mb-3 text-start">
                <input type="text" name="username" class="form-control" id="username" placeholder="Tên đăng nhập" required>
                <label for="username"><i class="fas fa-user me-2"></i>Tên đăng nhập</label>
            </div>

            <div class="form-floating mb-4 text-start">
                <input type="password" name="password" class="form-control" id="password" placeholder="Mật khẩu" required>
                <label for="password"><i class="fas fa-lock me-2"></i>Mật khẩu</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-login mb-3">Đăng nhập hệ thống</button>

            <div class="d-flex justify-content-between align-items-center mt-4">
                <a href="{% url 'home' %}" class="text-decoration-none text-muted small">
                    <i class="fas fa-arrow-left me-1"></i> Trang chủ
                </a>

                <div>
                    <a href="{% url 'password_reset' %}" class="text-decoration-none text-muted small me-3">
                        Quên mật khẩu?
                    </a>
                    <a href="{% url 'register' %}" class="text-decoration-none fw-bold small text-primary">
                        Đăng ký
                    </a>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
