<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên mật khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">
    <div class="card p-4 shadow-sm" style="max-width: 400px; width: 100%;">
        <h3 class="text-primary fw-bold text-center mb-3">Quên Mật Khẩu?</h3>
        <p class="text-muted small text-center mb-4">Nhập email bạn đã dùng để đăng ký. Hệ thống sẽ gửi link đặt lại mật khẩu cho bạn.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Nhập địa chỉ Email..." required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Gửi yêu cầu</button>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'login' %}" class="text-decoration-none small">Quay lại Đăng nhập</a>
        </div>
    </div>
</body>
</html>
