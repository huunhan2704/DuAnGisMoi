<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quên Mật Khẩu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-header bg-primary text-white text-center fw-bold py-3">
                        <i class="fa-solid fa-unlock-keyhole"></i> KHÔI PHỤC MẬT KHẨU
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted text-center mb-4">Vui lòng nhập địa chỉ Email của bạn. Chúng tôi sẽ gửi một đường dẫn an toàn để bạn đặt lại mật khẩu mới.</p>
                        
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label class="form-label fw-bold">Email của bạn:</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white"><i class="fa-solid fa-envelope text-muted"></i></span>
                                    <input type="email" name="email" class="form-control" required placeholder="nhapemail@gmail.com">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold shadow-sm">GỬI LINK KHÔI PHỤC</button>
                        </form>
                        
                        <div class="text-center mt-3">
                            <a href="{% url 'login' %}" class="text-decoration-none text-secondary"><i class="fa-solid fa-arrow-left"></i> Quay lại Đăng nhập</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
