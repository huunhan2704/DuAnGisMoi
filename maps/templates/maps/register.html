<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký tài khoản</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0d6efd, #0dcaf0); }
        .card-custom { width: 100%; max-width: 400px; padding: 30px; border-radius: 15px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
    </style>
</head>
<body>
    <div class="card-custom text-center">
        <h3 class="fw-bold text-primary mb-3">Đăng Ký Tài Khoản</h3>
        <p class="text-muted mb-4">Nhập email để bảo vệ tài khoản của bạn</p>
        
        <form method="POST">
            {% csrf_token %}
            
            {% for field in form %}
            <div class="form-floating mb-3 text-start">
                <input type="{{ field.field.widget.input_type }}" 
                       name="{{ field.name }}" 
                       class="form-control {% if field.errors %}is-invalid{% endif %}" 
                       id="{{ field.id_for_label }}" 
                       placeholder="{{ field.label }}">
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {% if field.errors %}
                    <div class="invalid-feedback">
                        {{ field.errors.0 }}
                    </div>
                {% endif %}
                {% if field.help_text %}
                    <div class="form-text small">{{ field.help_text }}</div>
                {% endif %}
            </div>
            {% endfor %}
            
            <button type="submit" class="btn btn-success w-100 py-2 fw-bold mb-3">Tạo tài khoản</button>
        </form>
        
        <div class="text-center mt-3">
            <small>Đã có tài khoản? <a href="{% url 'login' %}" class="fw-bold text-decoration-none">Đăng nhập ngay</a></small>
        </div>
    </div>
</body>
</html>
