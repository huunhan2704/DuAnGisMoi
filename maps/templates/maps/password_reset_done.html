<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đã gửi Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container text-center">
        <div class="card shadow border-0 rounded-3 mx-auto" style="max-width: 500px;">
            <div class="card-body p-5">
                <i class="fa-solid fa-envelope-circle-check text-success mb-3" style="font-size: 5rem;"></i>
                <h3 class="fw-bold">Đã gửi đường dẫn!</h3>
                <p class="text-muted mt-3">Chúng tôi vừa gửi một email khôi phục. Vui lòng kiểm tra hộp thư (bao gồm cả thư rác) và bấm vào link bên trong để tạo mật khẩu mới.</p>
                <a href="{% url 'login' %}" class="btn btn-outline-primary mt-4 px-4 fw-bold">Về trang Đăng nhập</a>
            </div>
        </div>
    </div>
</body>
</html>
