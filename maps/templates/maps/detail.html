<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết hồ sơ #{{ ho_so.id }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map-detail { height: 300px; width: 100%; border-radius: 8px; }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 fw-bold">Hồ sơ phản ánh #{{ ho_so.id }}</h5>
                        <a href="{% url 'quan_ly_hien_truong' %}" class="btn btn-sm btn-light fw-bold">Quay lại</a>
                    </div>
                    <div class="card-body">
                        <h3 class="text-primary fw-bold">{{ ho_so.tieu_de }}</h3>
                        <p class="text-muted"><i class="fa-regular fa-clock me-1"></i> Gửi lúc: {{ ho_so.thoi_gian|date:"H:i d/m/Y" }}</p>
                        
                        <div class="mb-3">
                            <span class="badge {% if ho_so.trang_thai == 'da_xu_ly' %}bg-success{% elif ho_so.trang_thai == 'dang_xu_ly' %}bg-warning text-dark{% else %}bg-danger{% endif %} fs-6">
                                {{ ho_so.get_trang_thai_display }}
                            </span>
                        </div>

                        <hr>
                        
                        <h6 class="fw-bold">Mô tả chi tiết:</h6>
                        <p>{{ ho_so.mo_ta }}</p>

                        <h6 class="fw-bold mt-4">Hình ảnh hiện trường:</h6>
                        {% if ho_so.hinh_anh %}
                            <img src="{{ ho_so.hinh_anh.url }}" class="img-fluid rounded border mb-3" style="max-height: 400px;">
                        {% else %}
                            <p class="text-muted fst-italic">Không có hình ảnh.</p>
                        {% endif %}

                        <h6 class="fw-bold mt-4">Vị trí sự cố:</h6>
                        <div id="map-detail" class="border"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Lấy dữ liệu tọa độ từ Database
        var rawData = {{ ho_so.du_lieu_toa_do|safe|default:"[]" }};
        
        // Khởi tạo bản đồ
        if (rawData.length > 0) {
            var firstPoint = rawData[0];
            var map = L.map('map-detail').setView([firstPoint.lat, firstPoint.lng], 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // Vẽ các điểm lên bản đồ
            rawData.forEach(function(p) {
                L.marker([p.lat, p.lng]).addTo(map)
                .bindPopup("<b>{{ ho_so.tieu_de }}</b>").openPopup();
            });
        } else {
            document.getElementById('map-detail').innerHTML = "<p class='text-center p-5 text-muted'>Không có dữ liệu tọa độ.</p>";
        }
    </script>
</body>
</html>
