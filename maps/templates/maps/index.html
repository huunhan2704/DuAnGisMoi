<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ Phản ánh</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100%; } /* Bản đồ full màn hình */
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Tọa độ TP.HCM
        var map = L.map('map').setView([10.762622, 106.660172], 13);

        // Thêm lớp bản đồ nền OpenStreetMap
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Thêm sự kiện click để hiện tọa độ (Demo)
        map.on('click', function(e) {
            L.popup()
                .setLatLng(e.latlng)
                .setContent("Tọa độ: " + e.latlng.toString())
                .openOn(map);
        });
    </script>
</body>
</html>
