<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phản ánh hiện trường - GIS</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Segoe UI', sans-serif; }
        
        /* Khung chính chia đôi Sidebar và Map */
        .main-container { 
            display: flex; 
            flex: 1; 
            overflow: hidden; 
            position: relative; /* Để làm neo cho nút GPS */
        }

        #sidebar {
            width: 350px;
            background: #f8f9fa;
            padding: 20px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            overflow-y: auto;
            z-index: 1000;
            border-right: 1px solid #dee2e6;
        }

        /* Sửa lỗi khung trắng: Map phải chiếm toàn bộ phần còn lại */
        #map { 
            flex: 1; 
            height: 100%; 
            background: #e9ecef; /* Màu nền chờ khi bản đồ load */
        }

        /* Nút định vị GPS - Né nút Zoom */
        .custom-map-control-button {
            position: absolute; 
            bottom: 100px; 
            right: 10px; 
            z-index: 1000;
            background-color: #fff; border: none; border-radius: 4px;
            width: 40px; height: 40px; box-shadow: 0 1px 4px rgba(0,0,0,0.3);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .custom-map-control-button:hover { background-color: #ebebeb; }
        .custom-map-control-button svg { width: 22px; height: 22px; fill: #444; }

        /* Style cho danh sách điểm chọn */
        #points-list li {
            background: white; border: 1px solid #dee2e6; border-radius: 5px;
            margin-bottom: 5px; padding: 8px; display: flex; justify-content: space-between; align-items: center;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#"><i class="fa-solid fa-map-location-dot me-2"></i>GIS Phản Ánh</a>
            <div class="d-flex">
                <a href="#" class="btn btn-light text-primary fw-bold btn-sm">Đăng nhập</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        
        <div id="sidebar">
            <h5 class="mb-3 text-primary fw-bold"><i class="fa-solid fa-pen-to-square"></i> Gửi phản ánh</h5>
            
            {% csrf_token %} 
            <input type="hidden" id="points-data" name="points_data">

            <div class="mb-3">
                <label class="form-label fw-bold small">Các điểm đã chọn:</label>
                <div class="bg-white border rounded p-2" style="max-height: 150px; overflow-y: auto;">
                    <ul id="points-list" class="list-unstyled m-0">
                        <li class="text-center text-muted fst-italic small" id="empty-msg">
                            Chưa chọn điểm nào (Click lên bản đồ)
                        </li>
                    </ul>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small">Tiêu đề</label>
                <input type="text" id="tieu_de" class="form-control" placeholder="Ví dụ: Nắp cống bị vỡ...">
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small">Mô tả</label>
                <textarea id="mo_ta" class="form-control" rows="3" placeholder="Mô tả chi tiết..."></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold small">Hình ảnh</label>
                <input type="file" id="hinh_anh" class="form-control" accept="image/*">
            </div>

            <button onclick="guiBaoCao()" class="btn btn-success w-100 py-2 fw-bold shadow-sm">
                <i class="fa-solid fa-paper-plane me-1"></i> Gửi Phản Ánh
            </button>
        </div>

        <div id="map"></div> 

        <button class="custom-map-control-button" onclick="locateUser()" title="Vị trí của tôi">
            <svg viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
        </button>

    </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // Khởi tạo Map
        var map = L.map('map', {zoomControl: false}).setView([10.762622, 106.660172], 13);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        L.control.zoom({ position: 'bottomright' }).addTo(map);

        // QUAN TRỌNG: Ép bản đồ load lại để hết khung trắng
        setTimeout(function() {
            map.invalidateSize();
        }, 500);

        var markers = []; 

        function renderPointsList() {
            var listElement = document.getElementById('points-list');
            var emptyMsg = document.getElementById('empty-msg');
            var dataInput = document.getElementById('points-data');
            listElement.innerHTML = ''; 
            if (markers.length === 0) {
                listElement.appendChild(emptyMsg);
                emptyMsg.style.display = 'block';
                dataInput.value = "";
            } else {
                markers.forEach(function(item, index) {
                    var li = document.createElement('li');
                    li.innerHTML = `<span><strong>#${index + 1}</strong>: ${item.lat.toFixed(5)}, ${item.lng.toFixed(5)}</span>`;
                    var delBtn = document.createElement('button');
                    delBtn.innerHTML = '<i class="fa-solid fa-times"></i>'; 
                    delBtn.className = 'btn btn-danger btn-sm';
                    delBtn.onclick = function() { removePoint(index); };
                    li.appendChild(delBtn);
                    listElement.appendChild(li);
                });
                dataInput.value = JSON.stringify(markers.map(m => ({lat: m.lat, lng: m.lng})));
            }
        }

        function addMarker(lat, lng) {
            var newPoint = L.latLng(lat, lng);
            for (var i = 0; i < markers.length; i++) {
                if (map.distance(newPoint, L.latLng(markers[i].lat, markers[i].lng)) < 10) {
                    alert("⚠️ Điểm này quá gần điểm đã chọn!"); return;
                }
            }
            var newMarker = L.circleMarker([lat, lng], {
                color: '#ffffff', fillColor: '#0d6efd', fillOpacity: 1, radius: 8, weight: 2
            }).addTo(map);
            markers.push({ marker: newMarker, lat: lat, lng: lng });
            renderPointsList();
        }

        function removePoint(index) {
            map.removeLayer(markers[index].marker); 
            markers.splice(index, 1); 
            renderPointsList(); 
        }

        map.on('click', function(e) { addMarker(e.latlng.lat, e.latlng.lng); });

        function locateUser() { map.locate({setView: true, maxZoom: 16}); }
        map.on('locationfound', function(e) {
            addMarker(e.latlng.lat, e.latlng.lng);
            L.popup().setLatLng(e.latlng).setContent("📍 Bạn ở đây").openOn(map);
        });

        function guiBaoCao() {
            var tieude = document.getElementById('tieu_de').value;
            var points = document.getElementById('points-data').value;
            if (!points || points === "[]") { alert("⚠️ Vui lòng chọn điểm!"); return; }
            if (tieude.trim() === "") { alert("⚠️ Nhập tiêu đề!"); return; }

            var btn = document.querySelector('button[onclick="guiBaoCao()"]');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang gửi...';
            btn.disabled = true;

            var formData = new FormData();
            formData.append('tieu_de', tieude);
            formData.append('mo_ta', document.getElementById('mo_ta').value);
            formData.append('points_data', points);
            if (document.getElementById('hinh_anh').files[0]) formData.append('hinh_anh', document.getElementById('hinh_anh').files[0]);
            formData.append('csrfmiddlewaretoken', document.querySelector('[name=csrfmiddlewaretoken]').value);

            fetch('/luu-phan-anh/', { method: 'POST', body: formData })
            .then(r => r.json()).then(data => {
                if (data.success) { alert("✅ Gửi thành công!"); resetForm(); }
                else alert("❌ Lỗi: " + data.message);
            })
            .catch(() => alert("❌ Lỗi hệ thống!"))
            .finally(() => { btn.innerHTML = '<i class="fa-solid fa-paper-plane me-1"></i> Gửi Phản Ánh'; btn.disabled = false; });
        }

        function resetForm() {
            document.getElementById('tieu_de').value = "";
            document.getElementById('mo_ta').value = "";
            document.getElementById('hinh_anh').value = "";
            markers.forEach(m => map.removeLayer(m.marker));
            markers = []; renderPointsList();
        }

        // Hiện điểm cũ
        {% for p in phan_anh %}
            L.marker([{{ p.location.y|stringformat:"f" }}, {{ p.location.x|stringformat:"f" }}]).addTo(map).bindPopup("<b>{{ p.title }}</b>");
        {% endfor %}
    </script>
</body>
</html>
