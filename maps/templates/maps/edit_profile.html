<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chỉnh sửa thông tin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white text-center py-3">
                        <h4 class="mb-0 fw-bold"><i class="fas fa-user-edit me-2"></i>Cập nhật thông tin</h4>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <h5 class="text-primary mb-3 border-bottom pb-2">Thông tin tài khoản</h5>
                            {% for field in user_form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">{{ field.label }}</label>
                                {{ field }}
                                <script>document.getElementsByName("{{ field.name }}")[0].className = "form-control";</script>
                                {% if field.help_text %}
                                    <small class="text-muted">{{ field.help_text }}</small>
                                {% endif %}
                            </div>
                            {% endfor %}

                            <h5 class="text-primary mb-3 mt-4 border-bottom pb-2">Thông tin mở rộng</h5>
                            {% for field in profile_form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">{{ field.label }}</label>
                                {{ field }}
                                <script>
                                    var el = document.getElementsByName("{{ field.name }}")[0];
                                    if(el.type !== 'file') el.className = "form-control";
                                    else el.className = "form-control form-control-sm"; 
                                </script>
                            </div>
                            {% endfor %}

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-success btn-lg fw-bold">
                                    <i class="fas fa-save me-2"></i> Lưu thay đổi
                                </button>
                                <a href="{% url 'profile' %}" class="btn btn-outline-secondary">
                                    <i class="fas fa-arrow-left me-2"></i> Quay lại
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
