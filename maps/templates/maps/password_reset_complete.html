<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đổi mật khẩu thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">
    <div class="container text-center">
        <div class="card shadow border-0 rounded-3 mx-auto" style="max-width: 500px;">
            <div class="card-body p-5">
                <i class="fa-solid fa-circle-check text-success mb-3" style="font-size: 5rem;"></i>
                <h3 class="fw-bold">Đổi mật khẩu thành công!</h3>
                <p class="text-muted mt-3">Tài khoản của bạn đã được cập nhật mật khẩu mới an toàn. Bây giờ bạn có thể đăng nhập để trải nghiệm hệ thống.</p>
                <a href="{% url 'login' %}" class="btn btn-success mt-4 px-5 fw-bold shadow-sm">Đăng nhập ngay</a>
            </div>
        </div>
    </div>
</body>
</html>
